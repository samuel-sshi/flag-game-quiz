name: Keep Supabase alive

on:
  schedule:
    - cron: '0 0 * * 1,4'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sS -o /dev/null \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/scores?select=id&limit=1"
